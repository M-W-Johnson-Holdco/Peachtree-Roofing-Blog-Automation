# Legacy alias — prefer publish.yml. Kept for older docs/links.
name: Approval Webhook

on:
  workflow_dispatch:
    inputs:
      draft_path:
        description: "Markdown draft or *-validation.json path"
        required: true
      decision:
        description: "approve (publish) or revise (skip)"
        required: true
        default: approve
      status:
        description: "PSAI status when decision is approve"
        required: false
        default: draft

permissions:
  contents: read

jobs:
  approval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system packages for PDF generation
        run: bash scripts/ci-apt-packages.sh

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Handle approval
        env:
          PYTHONPATH: src
          PSAI_API_KEY: ${{ secrets.PSAI_API_KEY }}
        run: |
          set -euo pipefail
          ARGS=("${{ inputs.draft_path }}" --decision "${{ inputs.decision }}")
          if [ "${{ inputs.decision }}" = "approve" ] && [ -n "${{ inputs.status }}" ]; then
            ARGS+=(--status "${{ inputs.status }}")
          fi
          python -m peachtree_blog.post "${ARGS[@]}"
