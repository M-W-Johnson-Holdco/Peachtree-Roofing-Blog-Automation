name: Weekly Blog Pipeline

on:
  workflow_dispatch:
    inputs:
      send_to_slack:
        description: Post the new draft to Slack after writing
        type: boolean
        default: true
  schedule:
    # Monday 8:00 AM America/New_York ≈ 12:00 UTC (EDT). Use 13:00 UTC during EST.
    - cron: "0 12 * * 1"

concurrency:
  group: weekly-blog-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  draft:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system packages for PDF generation
        run: bash scripts/ci-apt-packages.sh

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run search → evaluate → write
        env:
          PYTHONPATH: src
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          TOGETHER_WRITING_MODEL: ${{ secrets.TOGETHER_WRITING_MODEL }}
          AUTHOR_NAME: ${{ secrets.AUTHOR_NAME }}
          AUTHOR_CREDENTIALS: ${{ secrets.AUTHOR_CREDENTIALS }}
        run: |
          set -euo pipefail
          python pipeline.py --all --default

      - name: Post draft to Slack
        if: github.event_name == 'schedule' || inputs.send_to_slack == true
        env:
          PYTHONPATH: src
          SLACK_APPROVAL_BOT_TOKEN: ${{ secrets.SLACK_APPROVAL_BOT_TOKEN }}
          SLACK_APPROVAL_CHANNEL: ${{ secrets.SLACK_APPROVAL_CHANNEL }}
          PSAI_API_KEY: ${{ secrets.PSAI_API_KEY }}
        run: python pipeline.py --stage approve_post

      - name: Archive draft for Slack webhook
        if: github.event_name == 'schedule' || inputs.send_to_slack == true
        env:
          PYTHONPATH: src
        run: python scripts/archive_ci_draft.py --run-id "${{ github.run_id }}"

      - name: Commit generated draft archive
        if: github.event_name == 'schedule' || inputs.send_to_slack == true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/
          git diff --cached --quiet && exit 0
          git commit -m "Archive CI draft run ${{ github.run_id }} for Slack webhook"
          git push

      - name: Upload draft artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: blog-draft-${{ github.run_id }}
          path: |
            output/drafts/drafts_md/*.md
            output/drafts/drafts_pdf/*.pdf
            output/drafts/drafts_json/*-validation.json
            output/sources/kept_sources.json
            output/sources/evaluated_sources.json
          if-no-files-found: warn
          retention-days: 30
