name: Weekly Blog Pipeline

on:
  workflow_dispatch:
  schedule:
    # Monday 8:00 AM America/New_York is 12:00 UTC during daylight saving time.
    # Adjust to 13:00 UTC during standard time if exact local timing is required.
    - cron: "0 12 * * 1"

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run pipeline
        env:
          PYTHONPATH: src
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          GOOGLE_CREDENTIALS_PATH: ${{ secrets.GOOGLE_CREDENTIALS_PATH }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          APPROVAL_EMAIL: ${{ secrets.APPROVAL_EMAIL }}
          AUTHOR_NAME: ${{ secrets.AUTHOR_NAME }}
          AUTHOR_CREDENTIALS: ${{ secrets.AUTHOR_CREDENTIALS }}
        run: python pipeline.py --all
